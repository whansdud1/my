user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                  'rid=$http_x_request_id rt=$request_time';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 5m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  upstream uniteam_backend  { server backend:9538;  keepalive 32; }
  upstream uniteam_frontend { server frontend:9518; keepalive 32; }

  # ---- HTTP -> HTTPS 강제 (운영) ----
  server {
    listen 80;
    server_name p18.sumzip.com;

    # ACME (Let's Encrypt) 갱신용 경로는 평문 허용
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ---- HTTPS ----
  server {
    listen 443 ssl;
    http2 on;
    server_name p18.sumzip.com;

    # 개발 환경(자체 서명) 또는 운영(Let's Encrypt) — tls/ 디렉터리에 배치
    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    # X-Request-Id 생성/투과
    set $rid $http_x_request_id;
    if ($rid = "") {
      set $rid $request_id;
    }
    proxy_set_header X-Request-Id $rid;
    add_header X-Request-Id $rid always;

    # ---- API (9538) ----
    location /api/ {
      proxy_pass http://uniteam_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      # 채팅 첨부(사진·파일) 업로드 — 파일당 20MB + 여유. 백엔드 multer 가 최종 한도 강제.
      client_max_body_size 25m;
    }

    # ---- Frontend (9518) ----
    location / {
      proxy_pass http://uniteam_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
